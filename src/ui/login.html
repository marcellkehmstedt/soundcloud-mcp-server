<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect SoundCloud – MCP Server</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e0e0e0;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
    }

    .logo svg {
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 1.2rem;
      font-weight: 600;
      color: #ff5500;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #fff;
    }

    p.subtitle {
      font-size: 0.875rem;
      color: #888;
      margin-bottom: 1.75rem;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #aaa;
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 7px;
      padding: 0.65rem 0.85rem;
      font-size: 0.95rem;
      color: #e0e0e0;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 1.1rem;
    }

    input:focus {
      border-color: #ff5500;
    }

    button[type="submit"] {
      width: 100%;
      background: #ff5500;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.25rem;
    }

    button[type="submit"]:hover {
      background: #e64d00;
    }

    .hint {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #666;
      line-height: 1.6;
    }

    .hint a {
      color: #ff5500;
      text-decoration: none;
    }

    .hint a:hover {
      text-decoration: underline;
    }

    code {
      font-family: "SF Mono", "Fira Code", monospace;
      background: #222;
      border-radius: 4px;
      padding: 0.1em 0.4em;
      font-size: 0.85em;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <!-- SoundCloud-inspired waveform icon -->
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="36" height="36" rx="8" fill="#ff5500"/>
        <rect x="5"  y="20" width="3" height="12" rx="1.5" fill="white" opacity="0.6"/>
        <rect x="10" y="15" width="3" height="17" rx="1.5" fill="white" opacity="0.7"/>
        <rect x="15" y="10" width="3" height="22" rx="1.5" fill="white" opacity="0.85"/>
        <rect x="20" y="13" width="3" height="19" rx="1.5" fill="white"/>
        <rect x="25" y="17" width="3" height="15" rx="1.5" fill="white" opacity="0.75"/>
        <rect x="30" y="22" width="3" height="10" rx="1.5" fill="white" opacity="0.5"/>
      </svg>
      <span class="logo-text">SoundCloud MCP</span>
    </div>

    <h1>Connect your account</h1>
    <p class="subtitle">
      Enter your SoundCloud app credentials to authorise Claude to access
      your SoundCloud account.
    </p>

    <form method="POST" action="/oauth/authorize">
      <!-- Hidden PKCE / OAuth state fields populated server-side -->
      <input type="hidden" name="code_challenge" value="{{code_challenge}}" />
      <input type="hidden" name="state" value="{{state}}" />
      <input type="hidden" name="redirect_uri" value="{{redirect_uri}}" />
      <input type="hidden" name="client_id" value="{{client_id}}" />

      <label for="sc_client_id">Client ID</label>
      <input
        type="text"
        id="sc_client_id"
        name="sc_client_id"
        placeholder="Your SoundCloud app client_id"
        required
        autocomplete="off"
        spellcheck="false"
      />

      <label for="sc_client_secret">Client Secret</label>
      <input
        type="password"
        id="sc_client_secret"
        name="sc_client_secret"
        placeholder="Your SoundCloud app client_secret"
        required
        autocomplete="off"
      />

      <button type="submit">Connect with SoundCloud</button>
    </form>

    <div class="hint">
      <p>
        Don't have credentials yet? Register your app at
        <a href="https://soundcloud.com/you/apps" target="_blank" rel="noopener">
          soundcloud.com/you/apps
        </a>.
      </p>
      <p style="margin-top:0.6rem;">
        Set the redirect URI of your SoundCloud app to:<br/>
        <code id="redirect-uri-hint"></code>
      </p>
    </div>
  </div>

  <script>
    // Show the required redirect URI to the user
    const el = document.getElementById('redirect-uri-hint');
    if (el) {
      el.textContent = window.location.origin + '/soundcloud/callback';
    }
  </script>
</body>
</html>
