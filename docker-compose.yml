services:
  soundcloud-mcp:
    # Pull the pre-built image published by the GitHub Actions workflow.
    # Pin to a version tag (e.g. :v1.0.0) for reproducible deployments.
    image: ghcr.io/marcellkehmstedt/soundcloud-mcp-server:latest
    # To build locally from source instead, comment out `image:` above and
    # uncomment the line below (or run `docker compose build`).
    # build: .
    ports:
      - "3000:3000"
    environment:
      - PUBLIC_URL=https://your-domain.com
      - SOUNDCLOUD_REDIRECT_URI=https://your-domain.com/soundcloud/callback
      - PORT=3000
      # Optional: override the login UI accent color (hex, #rrggbb).
      # - UI_BRAND_COLOR=#3b82f6
    restart: unless-stopped
